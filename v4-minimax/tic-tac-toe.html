<!--
    Version 4 - Person vs Minimax Algorithm 

    Since this uses recursion, I first worked through the base cases where X win returns 1, O win returns -1, and a tie returns 0. From there I reasoned through how the recursion alternates between the maximizing player X and the minimizing player O and what the initial best score should be for optimization and comparison purposes, which was tricky and required writing things out and referencing several resources including https://www.geeksforgeeks.org/artificial-intelligence/mini-max-algorithm-in-artificial-intelligence/ and https://www.youtube.com/watch?v=5y2a0Zhgq0U&t=24s.
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Person vs Minimax Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Person vs Minimax Tic Tac Toe (Version 4)</h1>
    <p id="status">Your turn! You are O</p>
    <div class="board-container">
      <div class="board">
        <button class="square" id="0"></button>
        <button class="square" id="1"></button>
        <button class="square" id="2"></button>
        <button class="square" id="3"></button>
        <button class="square" id="4"></button>
        <button class="square" id="5"></button>
        <button class="square" id="6"></button>
        <button class="square" id="7"></button>
        <button class="square" id="8"></button>
      </div>
      <div class="win-line"></div>
    </div>
    <button onClick="startGame()" id="reset-button">Reset Game</button>
    <script src="script.js"></script>
    <script src="test.js"></script>
  </body>
</html>
